name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phonedesk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            phonedesk/package-lock.json
            phonedesk/client/package-lock.json
            phonedesk/server/package-lock.json
      - run: npm ci
      - run: npm ci --prefix client
      - run: npm ci --prefix server
      - run: npm run typecheck
      - run: npm run build
